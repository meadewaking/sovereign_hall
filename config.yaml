# 🏛️ Sovereign Hall - 系统配置文件
# 2026-03-02 更新

# LLM配置 (使用本地API)
llm:
  provider: "openai"  # openai/anthropic/local
  base_url: "http://172.18.5.19:8000/v1"
  model: "GLM-5.2-FP8"
  api_key: "not_need"
  model_uuid: ""  # 用于Host header；8000 为独立入口，不需要 Host 路由
  max_concurrent: 12
  temperature: 0.7
  max_tokens: 22500
  timeout: 600

  # Embedding 配置
  embedding_model: "bge-large-zh-v1.5"
  embedding_uuid: "ec85af59-12aa-4cba-9090-74cc48c39eda"
  embedding_dim: 1024
  embedding_base_url: "http://172.18.1.128:30977"
  embedding_input_per_1k: 0.0

# Token计费配置（当前为内网估算价，拿到真实费率后只改这里）
pricing:
  openai:
    GLM-5.2-FP8:
      input_per_1k: 0.0003
      output_per_1k: 0.0012

# 爬虫配置
spider:
  max_concurrent: 2  # 进一步降低并发，防止被封
  timeout: 30
  user_agent: "SovereignHall/1.0 (Research Bot)"
  proxy: "http://127.0.0.1:7890"
  retry_times: 3
  retry_delay: 2
  respect_robots_txt: true
  rate_limit:
    requests_per_minute: 6  # 进一步降低请求频率
    burst: 2
  search_interval: 5  # 增加搜索间隔，减少被封风险

# 模拟投资配置
simulation:
  enabled: true
  initial_capital: 10000  # 初始资金 10000 元
  target_invested_ratio: 1.0  # 模拟资金全部属于投资组合，不因风险偏好保留战略现金
  realtime_quotes_required: true  # 当前估值、盈亏、持仓复核和模拟成交只允许实时行情
  trade_during_market_hours_only: true  # 闭市行情仅查看，不执行模拟成交
  max_trade_price_age_days: 3  # 实时行情时间戳异常时的防御性上限
  stop_loss_pct: -0.08  # 逐仓强制复核默认止损
  take_profit_pct: 0.15  # 逐仓强制复核默认止盈
  max_holding_days: 30  # 超期持仓必须退出并重新配置，而不是无限冻结
  min_unit: 100  # 最小买卖单位：一手=100股
  trading_fee: 0.0003  # 佣金万三
  stamp_duty: 0.001  # 印花税千一（卖出时）
  max_daily_trades: 5  # 每个交易日最多5笔模拟成交；逐仓退出和投委会交易共用该额度

# 向量数据库
vector_db:
  provider: "legacy"  # legacy compatibility adapter; main RAG path uses knowledge_wiki
  dimension: 1024  # kept for old constructor compatibility
  index_type: "obsidian_wiki"

# Obsidian-compatible LLM Wiki knowledge base
knowledge_wiki:
  root: "./data/knowledge"
  embedding_enabled: true
  lazy_migration_batch_size: 10
  min_wiki_hits: 5
  chunk_target_chars: 1000
  chunk_max_chars: 1500
  chunk_min_chars: 200
  chunk_overlap_chars: 200

# 数据库配置
database:
  provider: "sqlite"
  path: "./sovereign_hall/data/sovereign_hall.db"

# 系统运行配置
system:
  mode: "research"  # research/production

  # Token预算护栏：本项目按“token 近似无限”运行，默认关闭预算暂停。
  # 只有明确需要无人值守成本保护时才设置为正数。
  daily_token_budget: 0
  daily_budget_pause_seconds: 3600
  validation_batch_size: 100

  # 迭代控制
  iteration_interval: 3600  # 每轮间隔（秒）
  max_iterations: null

  # 日志
  log_level: "INFO"

  # 并发控制
  enable_rate_limiting: true
  enable_circuit_breaker: true
  circuit_breaker:
    failure_threshold: 5
    timeout: 60

# 研究讨论配置
research:
  max_tokens: 22500
  reflection_limit: 5
  rounds: 6
  conclusion_max_length: 20000
  search_query_count: 30
  search_results_per_query: 10
  force_search_interval: 1
  stage2_max_docs: 30
  stage2_doc_chars: 1200
  stage2_context_chars: 24000
  agent_search_max_docs: 10
  agent_search_doc_chars: 1200
  committee_proposal_limit: 5
  committee_min_review_depth: "full"
  committee_full_discussion: true
  committee_round1_max_tokens: 18000
  committee_round2_max_tokens: 15000
  committee_revision_max_tokens: 12000
  committee_vote_max_tokens: 7500
  committee_summary_chars: 1200
  committee_vote_context_chars: 6000
  conclusion_discussion_context_chars: 24000

# 投委会配置
investment_committee:
  max_rounds: 3
  quorum: 5
  approval_threshold: 0.6
  strong_buy_threshold: 0.8
  defer_threshold: 0.5
  voting_weights:
    cio: 2.0
    risk_officer: 1.5
    quant_researcher: 1.0
    macro_strategist: 1.0
    analyst: 1.0

# 分析师配置
analysts:
  enabled_roles:
    - tmt_analyst
    - consumer_analyst
    - cycle_analyst
    - macro_strategist
    - risk_officer
    - quant_researcher

  sector_specialist:
    "TMT": "tmt_analyst"
    "科技": "tmt_analyst"
    "AI": "tmt_analyst"
    "消费": "consumer_analyst"
    "医药": "consumer_analyst"
    "白酒": "consumer_analyst"
    "周期": "cycle_analyst"
    "制造": "cycle_analyst"
    "金融": "macro_strategist"
    "地产": "macro_strategist"

# 机构记忆配置
institutional_memory:
  playbook_path: "./sovereign_hall/data/playbooks"
  version_control: true
  min_outcome_samples: 3
  confidence_adjustment_factor: 0.1
  blacklist_threshold: 3
  blacklist_duration: 2592000
  retrieval_top_k: 5
  similarity_threshold: 0.7

# 输出配置
output:
  reports_dir: "./sovereign_hall/data/reports"
  minutes_dir: "./sovereign_hall/data/minutes"
  archive:
    enabled: true
    retention_days: 180

# 版本信息
version: "1.1.0"
last_updated: "2026-03-02"
